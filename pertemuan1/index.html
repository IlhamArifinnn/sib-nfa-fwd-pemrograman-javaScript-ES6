<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Tugas 1 Javascript - Menghitung Luas Bangun Datar</title>
  </head>
  <body>
    <h2>Tugas 1 - JavaScript: Menghitung Luas Bangun Datar</h2>
    <script>
      // Menghitung luas persegi panjang
      // Deklarasi dan inisialisasi variabel
      let panjang = 8;
      let lebar = 5;
      let luasPersegiPanjang = panjang * lebar;
      // Cetak hasil
      document.write(
        `Luas Persegi Panjang dengan panjang ${panjang} dan lebar ${lebar} = ${luasPersegiPanjang} <br>`,
      );

      // Menghitung luas bujur sangkar
      // Deklarasi dan inisialisasi variabel
      let sisi = 7;
      let luasBujurSangkar = sisi * sisi;
      // Cetak hasil
      document.write(
        `Luas Bujur Sangkar dengan sisi ${sisi} = ${luasBujurSangkar} <br>`,
      );

      // Menghitung luas segitiga
      // Deklarasi dan inisialisasi variabel
      let alas = 8;
      let tinggi = 6;
      let luasSegitiga = 0.5 * alas * tinggi;
      // Cetak hasil
      document.write(
        `Luas Segitiga dengan alas ${alas} dan tinggi ${tinggi} = ${luasSegitiga} <br>`,
      );
    </script>
  </body>
</html>
